# karakum compose: one service per toolchain image.
# Mounts/env are declared here and parameterized by ${VARS} the launcher exports
# (memory clone, per-agent ~/.claude state). The project clone (optional, so it
# can't be a static line) and the variable-length secret set are the only things
# the launcher adds dynamically via `-v` / `-e` flags on `docker compose run`.

name: karakum

services:
  agent-claude:
    build:
      context: ./containers/claude
    image: karakum-agent-claude:latest
    tty: true
    stdin_open: true
    environment:
      # Relocate Claude Code's config into the mounted state dir below. By default
      # ~/.claude.json (OAuth session, project trust, allowed tools, caches) sits
      # at $HOME — outside the mount — so it's lost every run. CLAUDE_CONFIG_DIR
      # moves it into ~/.claude. See anthropics/claude-code#14313.
      CLAUDE_CONFIG_DIR: /home/agent/.claude
    volumes:
      # Memory session clone (the "scratchpad"), mounted under the container home
      # at ${MEMORY_MOUNT} (~/scratchpad) rather than its host path, so the
      # container never sees the external filesystem. `:-/dev/null` keeps `docker
      # compose build` from expanding to a bare `::rw` when the vars are unset.
      - ${MEMORY_SESSION:-/dev/null}:${MEMORY_MOUNT:-/dev/null}:rw
      # Per-agent ~/.claude state: a host dir (agent-owned, writable, persistent),
      # not a root-owned named volume. <state_root>/<agent>, default ~/.karakum/state.
      - ${CLAUDE_STATE_DIR:-/dev/null}:/home/agent/.claude:rw
