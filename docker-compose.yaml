# karakum compose: one service per toolchain image.
# Mounts and env come from the launcher; agents/projects are decoupled from compose.
#
# Memory worktree and per-agent state are the mounts declared here. Project
# worktree (if any) is added by the launcher via `-v` flags on `docker compose run`.
#
# ${CLAUDE_STATE_DIR} is the agent's `state.path` (see agents/<name>.yaml),
# resolved and exported by scripts/launch.sh. It persists ~/.claude across the
# agent's sessions and projects.

name: karakum

services:
  agent-claude:
    build:
      context: ./containers/claude
    image: karakum-agent-claude:latest
    tty: true
    stdin_open: true
    environment:
      # Relocate Claude Code's config into the persisted state mount below.
      # By default ~/.claude.json (OAuth session, project trust, allowed tools,
      # caches) sits at $HOME — outside the mount — so it's lost every run.
      # CLAUDE_CONFIG_DIR moves it into ~/.claude. See anthropics/claude-code#14313.
      CLAUDE_CONFIG_DIR: /home/agent/.claude
    volumes:
      - ${MEMORY_WORKTREE:-/dev/null}:${MEMORY_WORKTREE:-/dev/null}:rw
      - ${CLAUDE_STATE_DIR:-/dev/null}:/home/agent/.claude:rw
