# karakum compose: the single `agent` service (one image, three agent CLIs).
# Mounts/env are declared here and parameterized by ${VARS} the launcher exports
# (memory clone, per-agent ~/.claude state). The project clone (optional, so it
# can't be a static line) and the variable-length secret set are the only things
# the launcher adds dynamically via `-v` / `-e` flags on `docker compose run`.

name: karakum

services:
  # One image, three interchangeable agent CLIs on PATH (claude / codex /
  # opencode) — the user picks one after `just shell`.
  agent:
    build:
      context: ./containers/agent
    image: karakum-agent:latest
    tty: true
    stdin_open: true
    environment:
      # Relocate Claude Code's config into the mounted state dir below. By default
      # ~/.claude.json (OAuth session, project trust, allowed tools, caches) sits
      # at $HOME — outside the mount — so it's lost every run. CLAUDE_CONFIG_DIR
      # moves it into ~/.claude. See anthropics/claude-code#14313.
      CLAUDE_CONFIG_DIR: /home/agent/.claude
    volumes:
      # Memory session clone (the vault), mounted under the container home
      # at ${MEMORY_MOUNT} (~/<agent>) rather than its host path, so the
      # container never sees the external filesystem. `:-/dev/null` keeps `docker
      # compose build` from expanding to a bare `::rw` when the vars are unset.
      - ${MEMORY_SESSION:-/dev/null}:${MEMORY_MOUNT:-/dev/null}:rw
      # Per-CLI state, each a host dir (agent-owned, writable, persistent) under
      # <state_root>/<agent> (default ~/.karakum/state). The `:-/dev/null` guards
      # keep `docker compose build` working when the vars are unset.
      #   claude   → ~/.claude
      #   opencode → ~/.config/opencode (config) + ~/.local/share/opencode (data/auth)
      #   codex    → ~/.codex
      - ${CLAUDE_STATE_DIR:-/dev/null}:/home/agent/.claude:rw
      - ${OPENCODE_CONFIG_DIR:-/dev/null}:/home/agent/.config/opencode:rw
      - ${OPENCODE_DATA_DIR:-/dev/null}:/home/agent/.local/share/opencode:rw
      - ${CODEX_STATE_DIR:-/dev/null}:/home/agent/.codex:rw
