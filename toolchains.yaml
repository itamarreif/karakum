# Single source of truth for toolchain versions + per-ecosystem tooling.
# Each entry maps to a containers/toolchain-<name>/Dockerfile which is a thin
# wrapper over the canonical upstream image for that tool, plus the standard
# companion tools for that ecosystem (uv for python, tsc/pnpm for node).
# Bumping a version or adding a tool here + re-running `karakum build` is the
# only step needed.
#
# `detect` + `clean` drive `karakum session clean`: for each session clone,
# every toolchain whose `detect` command exits 0 (run from the clone root) has
# its `clean` command run there to free build artifacts (target/, node_modules,
# .venv, …). `detect` is a command (not a bare filename) so it can check a
# lockfile, glob, or recurse. A project that needs different behaviour (e.g. a
# nested package in a monorepo) sets `clean:` in its manifest, which replaces
# this autodetect entirely for that clone.

node:
  version: "22.11.0"
  tools:
    - typescript
    - pnpm
  detect: "test -f package.json"
  clean: "npm run clean --if-present"

python:
  version: "3.13"
  uv_version: "0.5.11"
  detect: "test -f pyproject.toml"
  clean: "rm -rf .venv __pycache__ .pytest_cache .mypy_cache .ruff_cache"

rust:
  version: "1.96.0"
  detect: "test -f Cargo.toml"
  clean: "cargo clean"
