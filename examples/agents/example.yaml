# An agent — a persistent identity whose "memory" is a git repo (skills,
# scratchpad, master prompt). Copy this to <config-dir>/agents/<name>.yaml and
# edit, where <config-dir> is $KARAKUM_CONFIG_DIR (default ~/.config/karakum).
#
# An agent is decoupled from:
#   - the toolchain (the container image the recipe runs)
#   - the project it works on (passed at invocation: `just shell <agent> <project> <slug>`)
#
# Memory = the agent's persistent self (skills, scratchpad, master prompt).
# Project (optional, per-session) = the codebase the agent acts on.
#
# Schema (MVP):
#   name              - identifier; used in branch names and the container name.
#                       A project clone's branch is <name>/<slug>; the memory
#                       clone's branch is <project>/<slug> (or just <slug> when
#                       no project is given).
#   memory.path       - local path to the agent's memory git repo
#   memory.repository - canonical remote; preflight verifies local origin matches
#   memory.init       - OPTIONAL shell command run inside the container after the
#                       mounts land, from the memory clone (`$KARAKUM_MEMORY`, i.e.
#                       ~/<name>). karakum runs it verbatim and stays framework-
#                       agnostic — use it to wire the memory framework into the
#                       toolchain. `$KARAKUM_TOOLCHAIN` is available for
#                       toolchain-specific destinations. Expected to be idempotent;
#                       a failure is non-fatal.
#
# Secrets are host-wide, not per-agent — see ../secrets.yaml.

name: example
memory:
  path: ~/code/you/your-memory-repo
  repository: github.com/you/your-memory-repo
  # Example: link a palimpsest vault's master prompt into Claude Code's startup memory.
  # init: ln -sfn "$KARAKUM_MEMORY/MASTER_PROMPT.md" "$HOME/.claude/CLAUDE.md"
