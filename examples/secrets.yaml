# karakum secrets — host-wide, shared across all agents and toolchains.
# Copy this to <config-dir>/secrets.yaml and edit, where <config-dir> is
# $KARAKUM_CONFIG_DIR (default ~/.config/karakum).
#
# References ONLY (op://…, env://…), never resolved values. The launcher resolves
# each at session start and injects `-e VAR` (name only) into the container — the
# value never touches the command line, never lands on disk, never gets logged.
#
# Adding a secret = one line below. The map key is the env-var name the container
# sees; the value is the provider reference. See karakum/secrets.py for providers.
#
# Reference schemes:
#   env://VAR                       → read $VAR from the caller's shell env (portable, no dep)
#   op://Vault/Item/field           → 1Password via the `op` CLI (run `op signin` first)

secrets:
  # claude authenticates from this (generate via `claude setup-token`); it takes
  # precedence over interactive /login, which doesn't work reliably in the
  # container. Without it, `just shell` + `claude` hangs on the login flow.
  CLAUDE_CODE_OAUTH_TOKEN: env://CLAUDE_CODE_OAUTH_TOKEN
  # Provider API keys for the codex + opencode CLIs (both on PATH in the image
  # alongside claude). opencode auto-detects the Anthropic/OpenAI providers from
  # these; codex reads OPENAI_API_KEY. Swap the op:// paths for your vault/item,
  # or use env:// for a portable, no-dep path.
  #
  # NOTE: ANTHROPIC_API_KEY is injected into *every* session, so `claude` may bill
  # against it (API credits) instead of the CLAUDE_CODE_OAUTH_TOKEN subscription.
  # If you want claude on the subscription, drop ANTHROPIC_API_KEY (opencode can
  # still use OpenAI), or drop CLAUDE_CODE_OAUTH_TOKEN to put everything on the key.
  ANTHROPIC_API_KEY: op://Work/Anthropic/key
  OPENAI_API_KEY: op://Work/OpenAI/key
  # GitHub token for gh/git inside the container. Shown via 1Password (run
  # `op signin` first); swap to env://GH_TOKEN for the portable, no-dep path.
  GH_TOKEN: op://Personal/GitHub/token
  # Postgres connection for projects whose build/tests need a live DB (e.g. sqlx
  # query macros without SQLX_OFFLINE). The value is whatever the cluster/host
  # configures — passed through from the caller's shell env, not stored here.
  # Uncomment to forward it into every session:
  # DATABASE_URL: env://DATABASE_URL
