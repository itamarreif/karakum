# karakum secrets — host-wide, shared across all agents and toolchains.
# Copy this to <config-dir>/secrets.yaml and edit, where <config-dir> is
# $KARAKUM_CONFIG_DIR (default ~/.config/karakum).
#
# References ONLY (op://…, env://…), never resolved values. The launcher resolves
# each at session start and injects `-e VAR` (name only) into the container — the
# value never touches the command line, never lands on disk, never gets logged.
#
# Adding a secret = one line below. The map key is the env-var name the container
# sees; the value is the provider reference. See karakum/secrets.py for providers.
#
# Reference schemes:
#   env://VAR                       → read $VAR from the caller's shell env (portable, no dep)
#   op://Vault/Item/field           → 1Password via the `op` CLI (run `op signin` first)

secrets:
  # claude authenticates from this (generate via `claude setup-token`); it takes
  # precedence over interactive /login, which doesn't work reliably in the
  # container. Without it, `just claude` hangs on the login flow.
  CLAUDE_CODE_OAUTH_TOKEN: env://CLAUDE_CODE_OAUTH_TOKEN
  GH_TOKEN: env://GH_TOKEN
