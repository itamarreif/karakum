# karakum secrets — host/harness-wide, shared across all agents and toolchains.
#
# This file holds REFERENCES ONLY (op://…, env://…), never resolved values.
# scripts/lib/secrets.sh resolves each at launch time, exports it into the
# launcher env, and injects `-e VAR` (name only) into the container — the value
# never touches the command line, never lands on disk, never gets logged.
#
# Adding a secret = one line below. Map key is the env var name the container
# sees; value is the provider reference. See skills/secrets/SKILL.md.

secrets:
  CLAUDE_CODE_OAUTH_TOKEN: op://Personal/karakum claude code oauth token/credential
