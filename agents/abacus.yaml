# abacus — agent for personal finance.
#
# Memory path/repo below are **placeholders** — set up the abacus memory repo
# (analogous to takwin: a private repo containing skills/, scratchpad/, master
# prompt) and edit the values here. Suggested layout:
#
#   ~/code/finance/.agents/        # local working copy
#   github.com/itamarreif/abacus   # canonical remote
#
# Until the repo exists, `just claude abacus <slug>` will fail at preflight.

name: abacus
memory:
  path: ~/code/finance/.agents
  repository: github.com/itamarreif/abacus
